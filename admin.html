<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 — 크리에이터 관리 | 호미팩토리</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..100,400..800&family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css?v=20260425-10" />

  <style>
    body { padding-top: 80px; }

    .admin-shell { max-width: 1280px; margin: 0 auto; padding: 40px 32px 120px; }
    .admin-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
      padding-bottom: 24px; border-bottom: 1px solid var(--border);
    }
    .admin-head h1 {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(28px, 3.5vw, 40px); letter-spacing: -0.02em; line-height: 1;
      margin-bottom: 6px;
    }
    .admin-head .sub { font-size: 13px; color: var(--text2); }
    .admin-user { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text2); }
    .admin-user .who { color: var(--text); font-weight: 600; }
    .btn-logout {
      padding: 8px 16px; border: 1px solid var(--border); border-radius: 100px;
      background: transparent; color: var(--text2); cursor: pointer;
      font-family: var(--font-body); font-size: 12px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--pink); color: var(--pink); }

    /* 추가 폼 */
    .creator-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 32px;
    }
    .creator-form h2 {
      font-family: var(--font-display); font-weight: 700;
      font-size: 20px; letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .creator-form p.form-intro {
      font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.7;
    }
    .form-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 11px; letter-spacing: 0.1em; color: var(--muted);
      text-transform: uppercase; font-weight: 600;
    }
    .form-group label .req { color: var(--pink); margin-left: 2px; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 12px 14px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; font-family: var(--font-body);
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--pink); }
    .form-hint {
      font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.5;
    }
    .form-preview {
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 16px;
      padding: 16px;
      background: var(--bg); border: 1px dashed var(--border); border-radius: 12px;
      min-height: 96px;
    }
    .form-preview .preview-photo {
      width: 64px; height: 64px; border-radius: 50%; overflow: hidden;
      background: linear-gradient(135deg, #c2faf6, #ffc5d4);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; flex-shrink: 0;
    }
    .form-preview .preview-photo img { width: 100%; height: 100%; object-fit: cover; }
    .form-preview .preview-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .form-preview .preview-text strong { color: var(--text); display: block; font-size: 14px; font-weight: 700; }
    .form-preview .preview-text .h { color: var(--pink); font-size: 11px; }

    .form-actions {
      display: flex; gap: 12px; align-items: center; margin-top: 18px;
    }
    .btn-primary-submit {
      padding: 12px 24px; background: var(--pink); color: #fff;
      border: none; border-radius: 100px;
      font-family: var(--font-body); font-weight: 700; font-size: 13px;
      cursor: pointer; transition: filter 0.2s, transform 0.2s;
    }
    .btn-primary-submit:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn-primary-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-secondary {
      padding: 12px 20px; background: transparent; color: var(--text2);
      border: 1px solid var(--border); border-radius: 100px;
      font-family: var(--font-body); font-size: 13px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--text2); color: var(--text); }
    .form-msg {
      margin-left: auto; padding: 8px 14px; border-radius: 8px;
      font-size: 12px; display: none;
    }
    .form-msg.success { display: block; background: rgba(0,244,233,0.1); color: #006d68; border: 1px solid rgba(0,244,233,0.3); }
    .form-msg.error { display: block; background: rgba(253,1,81,0.08); color: var(--pink); border: 1px solid rgba(253,1,81,0.25); }

    /* 목록 */
    .list-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }
    .list-head h2 {
      font-family: var(--font-display); font-weight: 700;
      font-size: 20px;
    }
    .list-count { font-size: 12px; color: var(--text2); }

    .creators-table {
      width: 100%; border-collapse: collapse;
      background: var(--surface); border-radius: 16px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .creators-table th,
    .creators-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left; font-size: 13px;
      vertical-align: middle;
    }
    .creators-table th {
      background: var(--bg);
      font-size: 11px; letter-spacing: 0.08em; color: var(--muted);
      text-transform: uppercase; font-weight: 600;
    }
    .creators-table tbody tr:last-child td { border-bottom: none; }
    .creators-table .col-thumb { width: 60px; }
    .creators-table .thumb {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--mint-soft), var(--pink-soft));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; overflow: hidden;
    }
    .creators-table .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .creators-table .name { font-weight: 600; color: var(--text); }
    .creators-table .handle { font-size: 12px; color: var(--text2); }
    .creators-table .badge {
      display: inline-block; padding: 2px 8px; border-radius: 100px;
      font-size: 10px; letter-spacing: 0.04em;
    }
    .badge.active { background: rgba(0,244,233,0.15); color: #006d68; }
    .badge.inactive { background: rgba(150,150,150,0.15); color: var(--muted); }

    .row-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .row-actions button {
      padding: 6px 12px; border-radius: 6px; font-size: 12px;
      cursor: pointer; transition: filter 0.2s;
      border: 1px solid var(--border); background: var(--bg); color: var(--text2);
      font-family: var(--font-body);
    }
    .row-actions button.edit:hover { color: var(--pink); border-color: var(--pink); }
    .row-actions button.delete:hover { color: #fff; background: var(--pink); border-color: var(--pink); }
    .row-actions button.toggle:hover { color: var(--text); border-color: var(--text2); }

    .loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .creators-table .col-cat { display: none; }
    }
  </style>
</head>

<script>
(async () => {
  const { sb } = window.HOMI;

  // 1. 인증 체크
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { location.href = 'login.html'; return; }
  document.getElementById('userEmail').textContent = session.user.email;

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
    location.href = 'login.html';
  });

  // ─── URL → 핸들·플랫폼 추출 ───
  function extractHandle(url, platform) {
    try {
      const u = new URL(url);
      const path = u.pathname.replace(/\/$/, '');
      const parts = path.split('/').filter(Boolean);
      if (platform === 'tiktok') {
        return (parts[0] || '').replace('@', '');
      }
      if (platform === 'youtube') {
        // /@handle 또는 /channel/UC... 또는 /c/name 또는 /user/name
        if (parts[0] && parts[0].startsWith('@')) return parts[0].replace('@', '');
        if (parts[0] === 'channel' || parts[0] === 'c' || parts[0] === 'user') return parts[1] || '';
        return parts[0] || '';
      }
      // instagram, other
      return parts[0] ? parts[0].replace('@', '') : '';
    } catch { return ''; }
  }

  function detectPlatform(url) {
    const u = (url || '').toLowerCase();
    if (u.includes('instagram.com')) return 'instagram';
    if (u.includes('tiktok.com')) return 'tiktok';
    if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
    return null;
  }

  function buildPhotoUrl(platform, handle) {
    if (!handle) return null;
    const map = { instagram: 'instagram', tiktok: 'tiktok', youtube: 'youtube' };
    const p = map[platform];
    if (!p) return null;
    // unavatar.io: profile photo by platform/handle, free, no key
    return `https://unavatar.io/${p}/${encodeURIComponent(handle)}`;
  }

  // ─── 미리보기 갱신 ───
  const elName = document.getElementById('f-name');
  const elPlat = document.getElementById('f-platform');
  const elUrl = document.getElementById('f-url');
  const elCat = document.getElementById('f-category');
  const pvPhoto = document.getElementById('previewPhoto');
  const pvName = document.getElementById('previewName');
  const pvHandle = document.getElementById('previewHandle');
  const pvMeta = document.getElementById('previewMeta');

  function updatePreview() {
    const url = elUrl.value.trim();
    const detected = detectPlatform(url);
    if (detected && detected !== elPlat.value) elPlat.value = detected;
    const handle = extractHandle(url, elPlat.value);
    const photo = buildPhotoUrl(elPlat.value, handle);
    pvName.textContent = elName.value.trim() || '미리보기';
    pvHandle.textContent = handle ? '@' + handle : '@handle';
    pvMeta.textContent = (elPlat.value ? elPlat.value.toUpperCase() : '') + (elCat.value ? ' · ' + elCat.value : '');
    if (photo) {
      pvPhoto.innerHTML = `<img src="${photo}" alt="" onerror="this.parentElement.innerHTML='✨'">`;
    } else {
      pvPhoto.textContent = '✨';
    }
  }
  [elName, elPlat, elUrl, elCat].forEach(el => el.addEventListener('input', updatePreview));
  elUrl.addEventListener('blur', updatePreview);

  // ─── 목록 로드 ───
  const listEl = document.getElementById('creatorsList');
  const countEl = document.getElementById('listCount');
  const escapeHtml = s => (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function showFormMsg(type, text) {
    const m = document.getElementById('formMsg');
    m.className = 'form-msg ' + type;
    m.textContent = text;
    if (type === 'success') setTimeout(() => { m.className = 'form-msg'; m.textContent = ''; }, 3000);
  }

  let cache = [];
  async function loadCreators() {
    listEl.innerHTML = '<div class="loading">불러오는 중…</div>';
    const { data, error } = await sb.from('creators').select('*').order('display_order', { ascending: true }).order('created_at', { ascending: false });
    if (error) { listEl.innerHTML = '<div class="loading">에러: ' + error.message + '</div>'; return; }
    cache = data;
    countEl.textContent = `총 ${data.length}명`;
    if (data.length === 0) { listEl.innerHTML = '<div class="loading">아직 등록된 크리에이터가 없습니다.</div>'; return; }

    const rows = data.map(c => {
      const thumb = c.photo_url
        ? `<img src="${escapeHtml(c.photo_url)}" alt="" onerror="this.parentElement.innerHTML='${escapeHtml(c.emoji||'✨')}'">`
        : `<span>${escapeHtml(c.emoji || '✨')}</span>`;
      const platformLabel = { instagram:'IG', tiktok:'TT', youtube:'YT', other:'—' }[c.platform] || '—';
      const activeBadge = c.is_active
        ? '<span class="badge active">활성</span>'
        : '<span class="badge inactive">숨김</span>';
      return `
        <tr data-id="${c.id}">
          <td class="col-thumb"><div class="thumb">${thumb}</div></td>
          <td>
            <div class="name">${escapeHtml(c.name || '')}</div>
            <div class="handle">${c.handle ? '@' + escapeHtml(c.handle) : ''} · ${platformLabel}</div>
          </td>
          <td class="col-cat">${escapeHtml(c.category || '')}</td>
          <td>${activeBadge}</td>
          <td>
            <div class="row-actions">
              <button class="toggle" data-action="toggle">${c.is_active ? '숨김' : '활성화'}</button>
              <button class="edit" data-action="edit">수정</button>
              <button class="delete" data-action="delete">삭제</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    listEl.innerHTML = `
      <table class="creators-table">
        <thead><tr>
          <th></th><th>이름·핸들</th><th class="col-cat">카테고리</th>
          <th>상태</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    listEl.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const tr = e.target.closest('tr');
        const id = tr.dataset.id;
        const action = btn.dataset.action;
        if (action === 'delete') {
          if (!confirm('정말 삭제할까요? 되돌릴 수 없습니다.')) return;
          const { error } = await sb.from('creators').delete().eq('id', id);
          if (error) return alert('삭제 실패: ' + error.message);
          loadCreators();
        } else if (action === 'toggle') {
          const c = cache.find(x => x.id === id);
          const { error } = await sb.from('creators').update({ is_active: !c.is_active }).eq('id', id);
          if (error) return alert('변경 실패: ' + error.message);
          loadCreators();
        } else if (action === 'edit') {
          const c = cache.find(x => x.id === id);
          startEdit(c);
        }
      });
    });
  }

  // ─── 폼 — 추가 / 수정 ───
  const form = document.getElementById('creatorForm');
  const formTitle = document.getElementById('formTitle');
  const cancelBtn = document.getElementById('formCancel');

  function resetForm() {
    form.reset();
    document.getElementById('editId').value = '';
    elPlat.value = 'instagram';
    formTitle.textContent = '+ 새 크리에이터 등록';
    cancelBtn.style.display = 'none';
    updatePreview();
  }

  function startEdit(c) {
    document.getElementById('editId').value = c.id;
    elName.value = c.name || '';
    elPlat.value = c.platform || 'instagram';
    elUrl.value = c.profile_url || '';
    elCat.value = c.category || '';
    formTitle.textContent = '✎ 수정 — ' + c.name;
    cancelBtn.style.display = 'inline-flex';
    updatePreview();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  cancelBtn.addEventListener('click', resetForm);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submit = document.getElementById('formSubmit');
    submit.disabled = true; submit.textContent = '저장 중...';

    const editId = document.getElementById('editId').value;
    const url = elUrl.value.trim();
    const platform = elPlat.value;
    const handle = extractHandle(url, platform);
    const photoUrl = buildPhotoUrl(platform, handle);

    // display_order: max + 10 (신규는 맨 뒤로)
    let display_order = 100;
    if (!editId) {
      const { data: maxRow } = await sb.from('creators').select('display_order').order('display_order', { ascending: false }).limit(1).maybeSingle();
      display_order = (maxRow?.display_order || 0) + 10;
    }

    const payload = {
      name: elName.value.trim(),
      handle: handle || null,
      platform,
      profile_url: url,
      category: elCat.value.trim() || null,
      photo_url: photoUrl,
      emoji: '✨',
      is_active: true,
      updated_at: new Date().toISOString()
    };
    if (!editId) payload.display_order = display_order;

    let error;
    if (editId) {
      ({ error } = await sb.from('creators').update(payload).eq('id', editId));
    } else {
      ({ error } = await sb.from('creators').insert(payload));
    }
    submit.disabled = false; submit.textContent = '저장 →';
    if (error) { showFormMsg('error', '저장 실패: ' + error.message); return; }
    showFormMsg('success', editId ? '수정 완료' : '등록 완료');
    resetForm();
    loadCreators();
  });

  // 초기 로드
  loadCreators();
})();
</script>

</body>
</html>
