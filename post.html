(function(){
  const params = new URLSearchParams(location.search);
  const slug = params.get('slug');
  const article = document.getElementById('postArticle');
  const post = POSTS[slug];

  if (!post) {
    article.innerHTML = '<div class="post-not-found"><h2 style="margin-bottom:12px;">글을 찾을 수 없습니다</h2><p style="color:var(--text2);">요청하신 글이 존재하지 않거나 이동되었을 수 있습니다.</p><p style="margin-top:24px;"><a href="blog.html" class="post-cta-btn" style="background:var(--text);">블로그 목록으로 →</a></p></div>';
    document.title = '글을 찾을 수 없습니다 | 호미팩토리';
    return;
  }

  // 페이지 제목·메타 갱신
  const plainTitle = post.title.replace(/<[^>]+>/g, '');
  document.title = plainTitle + ' | 호미팩토리';
  const desc = post.body.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,140);
  let metaDesc = document.querySelector('meta[name=description]');
  if (metaDesc) metaDesc.content = desc;
  // canonical
  let canonical = document.querySelector('link[rel=canonical]');
  if (canonical) canonical.href = 'https://homifactory.com/post.html?slug=' + slug;

  // 관련 글 — 같은 카테고리 2개
  const related = Object.keys(POSTS)
    .filter(k => k !== slug && POSTS[k].catSlug === post.catSlug)
    .slice(0, 2)
    .map(k => ({ slug: k, ...POSTS[k] }));

  let relatedHtml = '';
  if (related.length) {
    relatedHtml = '<div class="post-related">' +
      '<div class="post-related-label">RELATED POSTS</div>' +
      '<div class="post-related-list">' +
      related.map(r =>
        '<a class="post-related-item" href="post.html?slug=' + r.slug + '">' +
          '<div class="post-related-cat">' + r.cat + '</div>' +
          '<div class="post-related-title">' + r.title.replace(/<[^>]+>/g,'') + '</div>' +
        '</a>'
      ).join('') +
      '</div></div>';
  }

  article.innerHTML =
    '<div class="post-cat-tag">' + post.cat + '</div>' +
    '<h1 class="post-h1">' + post.title + '</h1>' +
    '<div class="post-meta">' +
      '<span>' + post.date + '</span>' +
      '<span>By ' + post.author + '</span>' +
      '<span>읽는 시간 · ' + post.read + '</span>' +
    '</div>' +
    '<div class="post-body">' + post.body + '</div>' +
    '<div class="post-cta">' +
      '<div class="post-cta-title">호미팩토리와 함께 캠페인을 설계해보세요</div>' +

      '<a href="index.html#inquiry-section" class="post-cta-btn">문의하기 →</a>' +

})();
