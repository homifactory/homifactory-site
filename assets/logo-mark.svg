<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 112" aria-label="Homi Factory Mark">
  <title>Homi Factory</title>
  <defs>
    <linearGradient id="hmFace" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="currentColor" stop-opacity="1"/>
      <stop offset="0.55" stop-color="currentColor" stop-opacity="0.55"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="hmFaceR" x1="1" y1="0" x2="0" y2="0.2">
      <stop offset="0" stop-color="currentColor" stop-opacity="1"/>
      <stop offset="0.55" stop-color="currentColor" stop-opacity="0.55"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="hmFold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="currentColor" stop-opacity="0.55"/>
      <stop offset="1" stop-color="currentColor" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Left post: outer bright face (parallelogram w/ angled top & bottom for hex silhouette) -->
  <polygon points="8,22 32,8 32,104 8,90" fill="url(#hmFace)"/>
  <!-- Left post: inner fold shadow (creates 3D twist) -->
  <polygon points="32,8 40,24 40,96 32,104" fill="url(#hmFold)"/>

  <!-- Right post: inner fold shadow -->
  <polygon points="56,24 64,8 64,104 56,96" fill="url(#hmFold)"/>
  <!-- Right post: outer bright face -->
  <polygon points="64,8 88,22 88,90 64,104" fill="url(#hmFaceR)"/>

  <!-- Crossbar: front face with slight angle matching posts -->
  <polygon points="32,50 64,46 64,62 32,58" fill="url(#hmFace)"/>
  <!-- Crossbar: top edge highlight (darker line) -->
  <polygon points="32,50 64,46 64,49 32,52" fill="currentColor" opacity="0.3"/>
  <!-- Crossbar: bottom edge shadow -->
  <polygon points="32,58 64,62 64,59 32,55" fill="currentColor" opacity="0.15"/>
</svg>
